<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let fetchValue = originalFetch;

            const defineFetch = (obj) => {
              try {
                Object.defineProperty(obj, 'fetch', {
                  get() {
                    return fetchValue;
                  },
                  set(val) {
                    fetchValue = val;
                  },
                  configurable: true,
                  enumerable: true
                });
                return true;
              } catch (e) {
                try {
                  delete obj.fetch;
                  Object.defineProperty(obj, 'fetch', {
                    get() { return fetchValue; },
                    set(val) { fetchValue = val; },
                    configurable: true,
                    enumerable: true
                  });
                  return true;
                } catch (e2) {
                  return false;
                }
              }
            };

            if (typeof Window !== 'undefined' && Window.prototype) {
              defineFetch(Window.prototype);
            }
            defineFetch(window);
            defineFetch(globalThis);
            defineFetch(self);
          }
        } catch (err) {
          console.warn("Defensive fetch setup error:", err);
        }

        const isFetchError = (msg) => {
          return msg && (
            msg.includes('Cannot set property fetch') ||
            msg.includes('only a getter') ||
            msg.includes('property fetch')
          );
        };

        window.addEventListener('error', (event) => {
          const msg = event.message || (event.error && event.error.message) || '';
          if (isFetchError(msg)) {
            event.preventDefault();
            console.warn("Muted non-fatal fetch assignment error:", msg);
          }
        });

        const oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          const msg = String(message || '');
          if (isFetchError(msg)) {
            console.warn("Muted non-fatal fetch assignment error via window.onerror:", msg);
            return true;
          }
          if (oldOnError) {
            return oldOnError.apply(this, arguments);
          }
          return false;
        };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTREND</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
